name: godot-ci

on:
  push:
    branches: [ main ]

env:
  GODOT_VERSION: "4.6" 

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    name: Export game and deploy to Pages
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Godot Export to HTML5
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          relative_project_path: ./
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}  

	- name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/windows/*"
          token: ${{ secrets.GH_TOKEN }}
          tag: "v${{ github.run_number }}"
          name: "Release v${{ github.run_number }}"
          body: "Автоматическая сборка из коммита ${{ github.sha }}"
          draft: false
          prerelease: false
          allowUpdates: true
